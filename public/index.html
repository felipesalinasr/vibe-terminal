function renderToolsView() {
  const catalog = connectorCatalog || {};
  const search = (document.getElementById('toolsSearch')?.value || '').toLowerCase();
  const grid = document.getElementById('toolsGrid');

  // Group by category
  const categories = {};
  for (const conn of Object.values(catalog)) {
    const name = conn.name.toLowerCase();
    const desc = (conn.description || '').toLowerCase();
    if (search && !name.includes(search) && !desc.includes(search)) continue;
    const cat = conn.category || 'other';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(conn);
  }

  if (!Object.keys(categories).length) {
    grid.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-dim);font-size:0.72rem;">No tools found</div>';
    return;
  }

  const categoryOrder = ['sales', 'communication', 'productivity', 'marketing', 'dev-tools'];
  const sorted = Object.keys(categories).sort((a, b) => {
    const ai = categoryOrder.indexOf(a), bi = categoryOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  let html = '';
  for (const cat of sorted) {
    html += `<div class="tools-category-label">${escapeHtml(cat)}</div>`;
    for (const conn of categories[cat]) {
      const expanded = selectedToolId === conn.id ? ' expanded' : '';
      html += `<div class="tools-card${expanded}" data-connector-id="${conn.id}" onclick="openToolDetail('${conn.id}')">
        <span class="tool-icon">${escapeHtml(conn.icon)}</span>
        <span class="tool-name">${escapeHtml(conn.name)}</span>
        <span class="tool-desc">${escapeHtml(conn.description || '')}</span>
        <span class="tool-badge">${conn.actions.length} action${conn.actions.length !== 1 ? 's' : ''}</span>
        <span class="tool-chevron">&#x25B8;</span>
      </div>`;
    }
  }
  grid.innerHTML = html;
}

function openToolDetail(connectorId) {
  const catalog = connectorCatalog || {};
  const conn = catalog[connectorId];
  if (!conn) return;

  // Toggle off if same card clicked
  if (selectedToolId === connectorId) {
    closeToolDetail();
    return;
  }

  selectedToolId = connectorId;

  // Update card highlights
  document.querySelectorAll('.tools-card').forEach(el => {
    el.classList.toggle('expanded', el.dataset.connectorId === connectorId);
  });
  document.querySelectorAll('.tools-card .tool-chevron').forEach(el => {
    // chevron rotation handled by CSS .expanded class
  });

  const panel = document.getElementById('toolsDetailPanel');
  let html = `<div class="tools-detail-header">
    <span class="tool-icon">${escapeHtml(conn.icon)}</span>
    <span class="tool-name">${escapeHtml(conn.name)}</span>
    <span class="tool-desc">${escapeHtml(conn.description || '')}</span>
  </div>`;
  for (const action of conn.actions) {
    html += `<div class="tools-action-row">
      <span class="action-name">${escapeHtml(action.name)}</span>
      <span class="action-mcp" title="${escapeHtml(action.mcpTool)}">${escapeHtml(action.mcpTool)}</span>
    </div>`;
  }
  panel.innerHTML = html;
  panel.style.display = 'block';

  // Scroll panel into view
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeToolDetail() {
  selectedToolId = null;
  document.querySelectorAll('.tools-card').forEach(el => el.classList.remove('expanded'));
  document.getElementById('toolsDetailPanel').style.display = 'none';
}

// ── CONNECTOR MANAGEMENT ──
let tplConnectorEntries = []; // TemplateConnectorConfig[]
let connectorCatalog = null;  // cached from backend
let selectedConnectorIndex = -1;

async function loadConnectorCatalog() {
  if (connectorCatalog) return connectorCatalog;
  try {
    const res = await fetch(`${API}/api/connectors/catalog`);
    connectorCatalog = await res.json();
  } catch { connectorCatalog = {}; }
  return connectorCatalog;
}

function renderConnectorChips() {
  const container = document.getElementById('tplConnectorChips');
  if (!tplConnectorEntries.length) { container.innerHTML = ''; return; }
  const catalog = connectorCatalog || {};
  container.innerHTML = tplConnectorEntries.map((cfg, i) => {
    const conn = catalog[cfg.connectorId];
    if (!conn) return '';
    const total = conn.actions.length;
    const enabled = cfg.allEnabled ? total : (cfg.enabledActions?.length || 0);
    const sel = i === selectedConnectorIndex ? ' selected' : '';
    return `<div class="connector-chip${sel}" data-index="${i}">
      <span class="chip-icon">${escapeHtml(conn.icon)}</span>
      <span class="chip-name" onclick="openConnectorDetail(${i})">${escapeHtml(conn.name)}</span>
      <span class="chip-count">${enabled}/${total}</span>
      <span class="chip-remove" onclick="event.stopPropagation();removeConnectorChip(${i})">&times;</span>
    </div>`;
  }).join('');
  refreshConnectorPickerStates();
}

function removeConnectorChip(index) {
  tplConnectorEntries.splice(index, 1);
  if (selectedConnectorIndex === index) closeConnectorDetail();
  else if (selectedConnectorIndex > index) selectedConnectorIndex--;
  renderConnectorChips();
}

function addConnector(connectorId) {
  if (tplConnectorEntries.some(c => c.connectorId === connectorId)) return;
  const catalog = connectorCatalog || {};
  const conn = catalog[connectorId];
  if (!conn) return;
  const cfg = {
    connectorId,
    enabledActions: conn.actions.map(a => a.id),
    allEnabled: true,
  };
  tplConnectorEntries.push(cfg);
  renderConnectorChips();
  openConnectorDetail(tplConnectorEntries.length - 1);
}

function openConnectorDetail(index) {
  const cfg = tplConnectorEntries[index];
  if (!cfg) return;
  const catalog = connectorCatalog || {};
  const conn = catalog[cfg.connectorId];
  if (!conn) return;
  selectedConnectorIndex = index;
  renderConnectorChips();
  const panel = document.getElementById('connectorDetailPanel');
  const allOn = cfg.allEnabled || cfg.enabledActions?.length === conn.actions.length;
  let html = `
    <button class="connector-detail-close" onclick="closeConnectorDetail()">&times;</button>
    <div class="connector-detail-header">
      <span class="chip-icon">${escapeHtml(conn.icon)}</span>
      <span class="connector-detail-name">${escapeHtml(conn.name)}</span>
      <span class="connector-detail-desc">${escapeHtml(conn.description)}</span>
    </div>
    <div class="connector-toggle-all">
      <span>Enable all actions</span>
      <label class="connector-toggle">
        <input type="checkbox" ${allOn ? 'checked' : ''} onchange="toggleAllConnectorActions(${index}, this.checked)">
        <span class="toggle-track"></span>
      </label>
    </div>`;
  for (const action of conn.actions) {
    const checked = cfg.allEnabled || cfg.enabledActions?.includes(action.id);
    html += `<div class="connector-action-row">
      <span class="action-name">${escapeHtml(action.name)}</span>
      <span class="action-mcp" title="${escapeHtml(action.mcpTool)}">${escapeHtml(action.mcpTool)}</span>
      <label class="connector-toggle">
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleConnectorAction(${index}, '${action.id}', this.checked)">
        <span class="toggle-track"></span>
      </label>
    </div>`;
  }
  panel.innerHTML = html;
  panel.style.display = 'block';
}

function closeConnectorDetail() {
  selectedConnectorIndex = -1;
  document.getElementById('connectorDetailPanel').style.display = 'none';
  renderConnectorChips();
}

function toggleConnectorAction(connIndex, actionId, enabled) {
  const cfg = tplConnectorEntries[connIndex];
  if (!cfg) return;
  const catalog = connectorCatalog || {};
  const conn = catalog[cfg.connectorId];
  if (!conn) return;
  // If was allEnabled, expand to explicit list first
  if (cfg.allEnabled) {
    cfg.enabledActions = conn.actions.map(a => a.id);
    cfg.allEnabled = false;
  }
  if (enabled) {
    if (!cfg.enabledActions.includes(actionId)) cfg.enabledActions.push(actionId);
  } else {
    cfg.enabledActions = cfg.enabledActions.filter(id => id !== actionId);
  }
  // Check if all are now enabled
  if (cfg.enabledActions.length === conn.actions.length) cfg.allEnabled = true;
  renderConnectorChips();
  // Update toggle-all checkbox without full re-render of detail
  const panel = document.getElementById('connectorDetailPanel');
  const toggleAll = panel.querySelector('.connector-toggle-all input');
  if (toggleAll) toggleAll.checked = cfg.allEnabled;
}

function toggleAllConnectorActions(connIndex, enabled) {
  const cfg = tplConnectorEntries[connIndex];
  if (!cfg) return;
  const catalog = connectorCatalog || {};
  const conn = catalog[cfg.connectorId];
  if (!conn) return;
  if (enabled) {
    cfg.enabledActions = conn.actions.map(a => a.id);
    cfg.allEnabled = true;
  } else {
    cfg.enabledActions = [];
    cfg.allEnabled = false;
  }
  // Re-render detail to update individual toggles
  openConnectorDetail(connIndex);
}

function renderConnectorCatalog() {
  const catalog = connectorCatalog || {};
  const search = (document.getElementById('connectorSearch')?.value || '').toLowerCase();
  const container = document.getElementById('connectorCatalog');
  const addedIds = new Set(tplConnectorEntries.map(c => c.connectorId));

  // Group by category
  const categories = {};
  for (const conn of Object.values(catalog)) {
    const name = conn.name.toLowerCase();
    const desc = (conn.description || '').toLowerCase();
    if (search && !name.includes(search) && !desc.includes(search)) continue;
    const cat = conn.category || 'other';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(conn);
  }

  if (!Object.keys(categories).length) {
    container.innerHTML = '<div class="connector-picker-empty">No connectors found</div>';
    return;
  }

  const categoryOrder = ['sales', 'communication', 'productivity', 'marketing', 'dev-tools'];
  const sorted = Object.keys(categories).sort((a, b) => {
    const ai = categoryOrder.indexOf(a), bi = categoryOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  let html = '';
  for (const cat of sorted) {
    html += `<div class="connector-category-header">${escapeHtml(cat)}</div>`;
    for (const conn of categories[cat]) {
      const added = addedIds.has(conn.id) ? ' added' : '';
      html += `<div class="connector-picker-item${added}" onclick="addConnector('${conn.id}')">
        <span class="picker-icon">${escapeHtml(conn.icon)}</span>
        <span class="picker-name">${escapeHtml(conn.name)}</span>
        <span class="picker-desc">${escapeHtml(conn.description)}</span>
        <span class="picker-badge">${conn.actions.length} actions</span>
      </div>`;
    }
  }
  container.innerHTML = html;
}

function refreshConnectorPickerStates() {
  const addedIds = new Set(tplConnectorEntries.map(c => c.connectorId));
  document.querySelectorAll('#connectorCatalog .connector-picker-item').forEach(el => {
    const id = el.getAttribute('onclick')?.match(/addConnector\('(.+?)'\)/)?.[1];
    if (id) el.classList.toggle('added', addedIds.has(id));
  });
}

function migrateToolsToConnectors(tools) {
  if (!tools?.length || !connectorCatalog) return [];
  const entries = [];
  const catalog = connectorCatalog;
  // Try to match tool strings to MCP tool names in catalog
  for (const conn of Object.values(catalog)) {
    const matchedActions = [];
    for (const action of conn.actions) {
      if (tools.includes(action.mcpTool) || tools.includes(action.id)) {
        matchedActions.push(action.id);
      }
    }
    if (matchedActions.length) {
      entries.push({
        connectorId: conn.id,
        enabledActions: matchedActions,
        allEnabled: matchedActions.length === conn.actions.length,
      });
    }
  }
  return entries;
}

}

function renderAgentsView() {
  const grid = document.getElementById('agentsGrid');
  const addCard = `
    <div class="agent-template-add" onclick="openCreateTemplateModal()">
      <div class="tpl-add-icon">+</div>
      <div class="tpl-add-label">New Agent</div>
    </div>
  `;
  const templateCards = templates.map(t => {
    const purposePreview = (t.identity || t.purpose || '').replace(/[#*_`]/g, '').slice(0, 200);
    const connectorTags = (t.connectors || []).map(c => {
      const cat = connectorCatalog?.[c.connectorId];
      return cat ? cat.name : c.connectorId;
    });
    const allTags = [
      ...(t.skills || []).map(s => `skill:${typeof s === 'string' ? s : s.name}`),
      ...connectorTags,
      ...(t.connectors?.length ? [] : (t.tools || [])),
    ];
    return `
      <div class="agent-template-card">
        <div class="tpl-name">${escapeHtml(t.name)}</div>
        <div class="tpl-cwd">${escapeHtml(t.defaultCwd || 'No default directory')}</div>
        <div class="tpl-purpose">${escapeHtml(purposePreview) || 'No purpose defined'}</div>
        ${allTags.length ? `<div class="tpl-tags">${allTags.map(tag => `<span class="tpl-tag">${escapeHtml(tag)}</span>`).join('')}</div>` : ''}
        <div class="tpl-actions">
          <button class="tpl-launch" onclick="launchFromTemplate('${t.id}')">Launch</button>
          <button onclick="openEditTemplateModal('${t.id}')">Edit</button>
          <button class="tpl-delete" onclick="deleteTemplateConfirm('${t.id}')">Delete</button>
        </div>
      </div>
    `;
  }).join('');
  grid.innerHTML = addCard + templateCards;
}

function openCreateTemplateModal() {

  document.getElementById('templateModalTitle').textContent = 'new agent template';
  document.getElementById('templateModalSubtitle').textContent = 'Create a reusable agent configuration';
  document.getElementById('tplName').value = '';
  document.getElementById('tplCwd').value = '';
  document.getElementById('tplIdentity').value = '';
  document.getElementById('tplConstraints').value = '';

  skillChipsExpanded = false;

  localSkillsLoaded = false;

async function openEditTemplateModal(id) {
  const t = templates.find(tpl => tpl.id === id);
  if (!t) return;
  editingTemplateId = id;
  document.getElementById('templateModalTitle').textContent = 'edit template';
  document.getElementById('templateModalSubtitle').textContent = `Editing: ${t.name}`;
  document.getElementById('tplName').value = t.name || '';
  document.getElementById('tplCwd').value = t.defaultCwd || '';
  document.getElementById('tplIdentity').value = t.identity || t.purpose || '';
  document.getElementById('tplConstraints').value = t.constraints || '';
  tplSkillEntries = normalizeSkills(t.skills || []);
  skillChipsExpanded = false;
  selectedSkillIndex = -1;
  document.getElementById('skillDetailPanel').style.display = 'none';
  localSkillsLoaded = false;
  externalSkillsLoaded = false;
  renderSkillChips();
  switchSkillInputMode('paste');
  document.getElementById('skillPasteInput').value = '';
  // Load connectors from template (or migrate old tools)
  selectedConnectorIndex = -1;
  document.getElementById('connectorDetailPanel').style.display = 'none';
  document.getElementById('connectorSearch').value = '';
  loadConnectorCatalog().then(() => {
    if (t.connectors?.length) {
      tplConnectorEntries = JSON.parse(JSON.stringify(t.connectors));
    } else {
      tplConnectorEntries = migrateToolsToConnectors(t.tools || []);
    }
    renderConnectorChips();
    renderConnectorCatalog();
  });
  document.getElementById('tplSubmitBtn').textContent = 'Save';
  document.getElementById('templateModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('tplName').focus(), 100);
  setupTemplateModalKeys();
}

function setupTemplateModalKeys() {
  const nameInput = document.getElementById('tplName');
  nameInput.onkeydown = e => {
    if (e.key === 'Escape') closeTemplateModal();
  };
  // Setup autocomplete for template cwd
  const cwdInput = document.getElementById('tplCwd');
  let tplDebounce;
  cwdInput.oninput = () => {
    clearTimeout(tplDebounce);
    tplDebounce = setTimeout(async () => {
      const suggestions = await fetchAutocomplete(cwdInput.value);
      renderTplAutocomplete(suggestions);
    }, 200);
  };
  cwdInput.onkeydown = e => {
    if (e.key === 'Escape') { document.getElementById('tplAutocompleteList').classList.remove('visible'); }
    if (e.key === 'Tab') {
      e.preventDefault();
      const items = document.getElementById('tplAutocompleteList').querySelectorAll('.autocomplete-item');
      if (items.length === 1) {
        cwdInput.value = items[0].dataset.path + '/';
        document.getElementById('tplAutocompleteList').classList.remove('visible');
        cwdInput.dispatchEvent(new Event('input'));
      }
    }
  };
}

function renderTplAutocomplete(suggestions) {
  const list = document.getElementById('tplAutocompleteList');
  if (suggestions.length === 0) { list.classList.remove('visible'); return; }
  list.innerHTML = suggestions.map(s =>
    `<div class="autocomplete-item" data-path="${escapeHtml(s)}" onclick="selectTplAutocomplete(this)">${escapeHtml(s)}</div>`
  ).join('');
  list.classList.add('visible');
}

function selectTplAutocomplete(el) {
  const input = document.getElementById('tplCwd');
  input.value = el.dataset.path + '/';
  document.getElementById('tplAutocompleteList').classList.remove('visible');
  input.focus();
  input.dispatchEvent(new Event('input'));
}

function toggleModalExpand() {
  const modal = document.getElementById('templateModal');
  const btn = document.getElementById('modalExpandBtn');
  modal.classList.toggle('expanded');
  const isExpanded = modal.classList.contains('expanded');
  btn.title = isExpanded ? 'Collapse' : 'Expand';
  btn.innerHTML = isExpanded ? '&#x2716;' : '&#x26F6;';
  if (isExpanded) modal.style.width = '';
}

function closeTemplateModal() {
  document.getElementById('templateModalOverlay').classList.remove('open');
  document.getElementById('tplAutocompleteList').classList.remove('visible');
  const modal = document.getElementById('templateModal');
  modal.classList.remove('expanded');
  modal.style.width = '460px';
  document.getElementById('modalExpandBtn').innerHTML = '&#x26F6;';
  document.getElementById('modalExpandBtn').title = 'Expand';
  editingTemplateId = null;
  tplConnectorEntries = [];
  selectedConnectorIndex = -1;
}

document.getElementById('templateModalOverlay').addEventListener('click', closeTemplateModal);

async function submitTemplate() {
  const name = document.getElementById('tplName').value.trim();
  if (!name) return;
  // Compute flat tools list from connectors for backward compat
  const connectorTools = [];
  const catalog = connectorCatalog || {};
  for (const cfg of tplConnectorEntries) {
    const conn = catalog[cfg.connectorId];
    if (!conn) continue;
    for (const action of conn.actions) {
      if (cfg.allEnabled || cfg.enabledActions?.includes(action.id)) {
        connectorTools.push(action.mcpTool);
      }
    }
  }
  const identityVal = document.getElementById('tplIdentity').value;
  const constraintsVal = document.getElementById('tplConstraints').value;
  const data = {
    name,
    defaultCwd: document.getElementById('tplCwd').value.trim(),
    purpose: identityVal,
    identity: identityVal,
    constraints: constraintsVal,
    skills: tplSkillEntries,
    tools: connectorTools,
    connectors: tplConnectorEntries,
  };
  if (editingTemplateId) {
    await fetch(`${API}/api/templates/${editingTemplateId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
  } else {
    await fetch(`${API}/api/templates`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
  }
  closeTemplateModal();
  await fetchTemplates();
  renderAgentsView();
}

async function deleteTemplateConfirm(id) {
  const t = templates.find(tpl => tpl.id === id);
  if (!confirm(`Delete template "${t?.name || id}"?`)) return;
  await fetch(`${API}/api/templates/${id}`, { method: 'DELETE' });
  await fetchTemplates();
  renderAgentsView();
}

async function browseForTemplate() {
  const res = await fetch(`${API}/api/browse`);
  const { path } = await res.json();
  if (path) {
    document.getElementById('tplCwd').value = path;
  }
}

async function importFromDirectory() {
  // Use the directory field value, or open native picker if empty
  let dir = document.getElementById('tplCwd').value.trim();
  if (!dir) {
    const res = await fetch(`${API}/api/browse`);
    const { path } = await res.json();
    if (!path) return;
    dir = path;
    document.getElementById('tplCwd').value = dir;
  }
  const btn = document.getElementById('tplImportBtn');
  btn.textContent = 'Importing...';
  try {
    const res = await fetch(`${API}/api/import-agent?path=${encodeURIComponent(dir)}`);
    const data = await res.json();
    if (data.name) document.getElementById('tplName').value = data.name;
    if (data.purpose) document.getElementById('tplIdentity').value = data.purpose;
    if (data.skills?.length) {
      data.skills.forEach(s => addSkillEntry({ name: s, source: 'local' }));
    }
    if (data.defaultCwd) document.getElementById('tplCwd').value = data.defaultCwd;
  } catch {}
  btn.textContent = 'Import';
}

function launchFromTemplate(id) {
  const t = templates.find(tpl => tpl.id === id);
  if (!t) return;
  pendingTemplateId = id;
  startSessionCardId = null;
  document.getElementById('startSessionSubtitle').textContent = `Launch: ${t.name}`;
  document.getElementById('sessionPath').value = t.defaultCwd || '~/';
  document.getElementById('startSessionOverlay').classList.add('open');
  setTimeout(() => document.getElementById('sessionPath').focus(), 100);

  const input = document.getElementById('sessionPath');
  let debounceTimer;
  input.oninput = () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(async () => {
      const suggestions = await fetchAutocomplete(input.value);
      renderAutocomplete(suggestions);
    }, 200);
  };
  input.onkeydown = e => {
    if (e.key === 'Enter') {
      const list = document.getElementById('autocompleteList');
      if (list.classList.contains('visible')) {
        const selected = list.querySelector('.selected');
        if (selected) { input.value = selected.dataset.path + '/'; list.classList.remove('visible'); return; }
      }
      startSession();
    }
    if (e.key === 'Escape') {
      const list = document.getElementById('autocompleteList');
      if (list.classList.contains('visible')) { list.classList.remove('visible'); return; }
      closeStartSessionModal();
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      const items = document.getElementById('autocompleteList').querySelectorAll('.autocomplete-item');
      if (items.length === 1) {
        input.value = items[0].dataset.path + '/';
        document.getElementById('autocompleteList').classList.remove('visible');
        input.dispatchEvent(new Event('input'));
      }
    }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      navigateAutocomplete(e.key === 'ArrowDown' ? 1 : -1);
    }
  };
}

function createAgent() {
  const templateId = document.getElementById('taskTemplateSelect').value || null;
  if (!templateId) return;
  const tpl = templates.find(t => t.id === templateId);
  if (!tpl) return;
  const now = new Date();
  const ts = now.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  const name = `${tpl.name} - ${ts}`;
  const task = { id: 'task-' + nextBacklogId++, name, tag: tpl.name, templateId };
  backlogTasks.push(task);
  localStorage.setItem('vt-backlog', JSON.stringify(backlogTasks));
  closeModal();
  render();
}

function openStartSessionModal(card) {
  startSessionCardId = card.id;
  pendingTemplateId = null;
  document.getElementById('startSessionSubtitle').textContent = `Open terminal for: ${card.title}`;
  // Pre-fill cwd from task's template if one is assigned
  const task = backlogTasks.find(t => t.id === card.id);
  let defaultPath = '~/';
  if (task?.templateId) {
    pendingTemplateId = task.templateId;
    const tpl = templates.find(t => t.id === task.templateId);
    if (tpl?.defaultCwd) defaultPath = tpl.defaultCwd;
  }
  document.getElementById('sessionPath').value = defaultPath;
  document.getElementById('startSessionOverlay').classList.add('open');
  setTimeout(() => document.getElementById('sessionPath').focus(), 100);

  const input = document.getElementById('sessionPath');
  let debounceTimer;
  input.oninput = () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(async () => {
      const suggestions = await fetchAutocomplete(input.value);
      renderAutocomplete(suggestions);
    }, 200);
  };

  input.onkeydown = e => {
    if (e.key === 'Enter') {
      const list = document.getElementById('autocompleteList');
      if (list.classList.contains('visible')) {
        const selected = list.querySelector('.selected');
        if (selected) {
          input.value = selected.dataset.path + '/';
          list.classList.remove('visible');
          return;
        }
      }
      startSession();
    }
    if (e.key === 'Escape') {
      const list = document.getElementById('autocompleteList');
      if (list.classList.contains('visible')) { list.classList.remove('visible'); return; }
      closeStartSessionModal();
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      const items = document.getElementById('autocompleteList').querySelectorAll('.autocomplete-item');
      if (items.length === 1) {
        input.value = items[0].dataset.path + '/';
        document.getElementById('autocompleteList').classList.remove('visible');
        input.dispatchEvent(new Event('input'));
      }
    }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      navigateAutocomplete(e.key === 'ArrowDown' ? 1 : -1);
    }
  };
}

function closeStartSessionModal() {
  document.getElementById('startSessionOverlay').classList.remove('open');
  document.getElementById('autocompleteList').classList.remove('visible');
  startSessionCardId = null;
  pendingTemplateId = null;
}

document.getElementById('startSessionOverlay').addEventListener('click', closeStartSessionModal);

function renderAutocomplete(suggestions) {
  const list = document.getElementById('autocompleteList');
  if (suggestions.length === 0) { list.classList.remove('visible'); return; }
  list.innerHTML = suggestions.map(s =>
    `<div class="autocomplete-item" data-path="${escapeHtml(s)}" onclick="selectAutocomplete(this)">${escapeHtml(s)}</div>`
  ).join('');
  list.classList.add('visible');
}

function selectAutocomplete(el) {
  const input = document.getElementById('sessionPath');
  input.value = el.dataset.path + '/';
  document.getElementById('autocompleteList').classList.remove('visible');
  input.focus();
  input.dispatchEvent(new Event('input'));
}

function navigateAutocomplete(dir) {
  const list = document.getElementById('autocompleteList');
  const items = Array.from(list.querySelectorAll('.autocomplete-item'));
  if (items.length === 0) return;
  const current = list.querySelector('.selected');
  let idx = current ? items.indexOf(current) : -1;
  if (current) current.classList.remove('selected');
  idx = (idx + dir + items.length) % items.length;
  items[idx].classList.add('selected');
}

// ── SKIP (open at ~/) ──
async function skipStartSession() {
  if (startSessionCardId) {
    const task = backlogTasks.find(t => t.id === startSessionCardId);
    if (!task) return;
    const tplId = task.templateId || pendingTemplateId || null;
    const session = await createSessionAPI(task.name, '~/', tplId);
    backlogTasks = backlogTasks.filter(t => t.id !== startSessionCardId);
    localStorage.setItem('vt-backlog', JSON.stringify(backlogTasks));
    closeStartSessionModal();
    await fetchSessions();
    render();
    const card = getAllCards().find(c => c.session === session.id);
    if (card) openPanel(card);
  } else if (pendingTemplateId) {
    const tpl = templates.find(t => t.id === pendingTemplateId);
    if (!tpl) return;
    const session = await createSessionAPI(tpl.name, '~/', pendingTemplateId);
    closeStartSessionModal();
    if (currentView === 'agents') switchView('board');
    await fetchSessions();
    render();
    const card = getAllCards().find(c => c.session === session.id);
    if (card) openPanel(card);
  }
}

// ── NATIVE DIRECTORY PICKER ──
async function toggleBrowser() {
  const res = await fetch(`${API}/api/browse`);
  const { path } = await res.json();
  if (path) {
    document.getElementById('sessionPath').value = path;
  }
}

async function startSession() {
  const pathInput = document.getElementById('sessionPath');
  const cwd = pathInput.value.trim();

  if (startSessionCardId) {
    // Backlog task → session flow
    const task = backlogTasks.find(t => t.id === startSessionCardId);
    if (!task) return;
    const tplId = task.templateId || pendingTemplateId || null;
    const session = await createSessionAPI(task.name, cwd, tplId);
    backlogTasks = backlogTasks.filter(t => t.id !== startSessionCardId);
    localStorage.setItem('vt-backlog', JSON.stringify(backlogTasks));
    closeStartSessionModal();
    await fetchSessions();
    render();
    const card = getAllCards().find(c => c.session === session.id);
    if (card) openPanel(card);
  } else if (pendingTemplateId) {
    // Template → direct launch flow
    const tpl = templates.find(t => t.id === pendingTemplateId);
    if (!tpl) return;
    const session = await createSessionAPI(tpl.name, cwd, pendingTemplateId);
    closeStartSessionModal();
    if (currentView === 'agents') switchView('board');
    await fetchSessions();
    render();
    const card = getAllCards().find(c => c.session === session.id);
    if (card) openPanel(card);
  }
}

// ── POLLING ──
setInterval(async () => {
  await fetchSessions();
  render();
}, 10000);

// ── INIT ──
(async () => {
  await Promise.all([fetchSessions(), fetchTemplates(), loadConnectorCatalog()]);
  render();
  closePanel();
  closeModal();
})();
</script>
